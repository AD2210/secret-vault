name: ci

on:
  push:
    branches:
      - main
      - beta
      - production
      - 'feature/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - beta
      - production

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, intl, pdo_sqlite, pdo_pgsql, sodium, xml
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Lint container
        run: env -u DATABASE_URL php bin/console lint:container

      - name: Lint Twig
        run: env -u DATABASE_URL php bin/console lint:twig templates

      - name: Tests
        run: composer qa:phpunit
