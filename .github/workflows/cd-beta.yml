name: cd-beta

on:
  push:
    branches:
      - beta
  workflow_dispatch:
    inputs:
      ref:
        description: Branch/tag to deploy
        required: false
        default: beta

concurrency:
  group: vault-cd-beta
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve ref
        id: resolve_ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.ref }}" ]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_ref.outputs.ref }}

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, intl, pdo_sqlite, pdo_pgsql, sodium, xml
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Tests
        run: composer qa:phpunit

  deploy-beta:
    runs-on: ubuntu-latest
    needs: quality-gate
    environment: beta
    steps:
      - name: Validate secrets
        run: |
          test -n "${{ secrets.BETA_SSH_HOST }}"
          test -n "${{ secrets.BETA_SSH_USER }}"
          test -n "${{ secrets.BETA_SSH_PRIVATE_KEY }}"

      - name: Resolve ref
        id: resolve_ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.ref }}" ]; then
            echo "ref=${{ inputs.ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_ref.outputs.ref }}

      - name: Build release artifact
        run: |
          tar \
            --exclude-vcs \
            --exclude='./vendor' \
            --exclude='./var' \
            --exclude='./tests' \
            --exclude='./docs' \
            --exclude='./.idea' \
            --exclude='./.phpunit.cache' \
            --exclude='./identifier.sqlite' \
            --exclude='./compose.override.yaml' \
            -czf "/tmp/vault-release-${GITHUB_SHA}.tar.gz" .

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.BETA_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -p "${{ secrets.BETA_SSH_PORT || '22' }}" "${{ secrets.BETA_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload artifact
        run: |
          scp -P "${{ secrets.BETA_SSH_PORT || '22' }}" \
            "/tmp/vault-release-${GITHUB_SHA}.tar.gz" \
            "${{ secrets.BETA_SSH_USER }}@${{ secrets.BETA_SSH_HOST }}:/tmp/vault-release-${GITHUB_SHA}.tar.gz"

      - name: Deploy on beta server
        run: |
          ssh -p "${{ secrets.BETA_SSH_PORT || '22' }}" "${{ secrets.BETA_SSH_USER }}@${{ secrets.BETA_SSH_HOST }}" \
            "DEPLOY_ENV_FILE='${{ secrets.BETA_DEPLOY_ENV_FILE || '/etc/client-secret-vault/server.env' }}' GITHUB_SHA='${GITHUB_SHA}' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          ARTIFACT="/tmp/vault-release-${GITHUB_SHA}.tar.gz"
          WORK_DIR="/tmp/vault-deploy-${GITHUB_SHA}"

          rm -rf "${WORK_DIR}"
          mkdir -p "${WORK_DIR}"
          tar -xzf "${ARTIFACT}" -C "${WORK_DIR}"

          chmod +x "${WORK_DIR}/ops/lib/common.sh" "${WORK_DIR}/ops/server/"*.sh
          "${WORK_DIR}/ops/server/deploy_release.sh" "${DEPLOY_ENV_FILE}" "${WORK_DIR}"

          rm -rf "${WORK_DIR}" "${ARTIFACT}"
          REMOTE
