name: CD Prod

on:
  workflow_run:
    workflows: ["ci"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_TAG: prod-${{ github.sha }}

concurrency:
  group: vault-prod-cd
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set image name
        run: |
          OWNER="${{ github.repository_owner }}"
          OWNER="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_NAME="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')"
          echo "IMAGE_NAME=ghcr.io/${OWNER}/${REPO_NAME}/client-secret-vault-app" >> "$GITHUB_ENV"

      - name: Build and push production image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/php/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:prod
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=Client Secret Vault application image
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha || github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Print pushed digest
        run: |
          echo "Pushed digest: ${{ steps.build_push.outputs.digest }}"

      - name: Copy compose files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          source: "compose.yaml,compose.prod.yaml"
          target: "${{ secrets.PROD_PATH }}"
          overwrite: true

      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail

            GHCR_USER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
            GHCR_REPO="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
            APP_PATH='${{ secrets.PROD_PATH }}'

            echo "Login to GHCR on VPS"
            echo '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            echo "Go to app directory"
            cd "${APP_PATH}"

            if [ ! -f .env ]; then
              echo "Missing .env in ${APP_PATH}" >&2
              exit 1
            fi

            export IMAGES_PREFIX="ghcr.io/${GHCR_USER}/${GHCR_REPO}/"
            export IMAGE_TAG='prod'

            if docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker compose"
            else
              echo "Docker Compose v2 is required on the server (command: docker compose)." >&2
              exit 1
            fi

            PULL_OUTPUT="$(docker pull "ghcr.io/${GHCR_USER}/${GHCR_REPO}/client-secret-vault-app:prod")"
            echo "${PULL_OUTPUT}"
            PULLED_DIGEST="$(printf '%s\n' "${PULL_OUTPUT}" | sed -n 's/^Digest: //p' | head -n 1)"
            EXPECTED_DIGEST='${{ steps.build_push.outputs.digest }}'
            echo "Expected digest: ${EXPECTED_DIGEST}"
            echo "Pulled digest:   ${PULLED_DIGEST}"
            if [ -z "${PULLED_DIGEST}" ]; then
              echo "Unable to parse pulled digest from docker pull output." >&2
              exit 1
            fi
            if [ -n "${EXPECTED_DIGEST}" ] && [ "${PULLED_DIGEST}" != "${EXPECTED_DIGEST}" ]; then
              echo "Digest mismatch for prod tag; aborting deployment." >&2
              exit 1
            fi

            $COMPOSE_CMD --env-file .env -f compose.yaml -f compose.prod.yaml pull app
            $COMPOSE_CMD --env-file .env -f compose.yaml -f compose.prod.yaml up -d --remove-orphans --force-recreate
            $COMPOSE_CMD --env-file .env -f compose.yaml -f compose.prod.yaml ps

            echo "Wait for app container to be healthy"
            for i in $(seq 1 60); do
              APP_CID="$($COMPOSE_CMD --env-file .env -f compose.yaml -f compose.prod.yaml ps -q app)"
              APP_STATE=""
              if [ -n "$APP_CID" ]; then
                APP_STATE="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$APP_CID" 2>/dev/null || true)"
              fi
              if [ "$APP_STATE" = "healthy" ] || [ "$APP_STATE" = "running" ]; then
                echo "App container is $APP_STATE."
                break
              fi
              if [ "$i" -eq 60 ]; then
                echo "App container is not healthy after 120s (state=$APP_STATE)." >&2
                $COMPOSE_CMD --env-file .env -f compose.yaml -f compose.prod.yaml ps
                exit 1
              fi
              sleep 2
            done

            echo "Run migrations"
            $COMPOSE_CMD --env-file .env -f compose.yaml -f compose.prod.yaml exec -T app php bin/console doctrine:migrations:migrate --no-interaction --env=prod

            echo "Prune old images (safe)"
            docker image prune -f || true
