
services:
###> doctrine/doctrine-bundle ###
  app:
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
    volumes:
      - ./:/app
  worker:
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
    volumes:
      - ./:/app
  database:
    ports:
      - "${POSTGRES_PORT:-5452}:5432"
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025"
      - "8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
###< symfony/mailer ###
