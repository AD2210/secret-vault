services:
  app:
    build: ./docker/php
    env_file: .env
    environment:
      APP_ENV: dev
      DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-client_secret_vault}?serverVersion=16&charset=utf8"
      DEFAULT_URI: "${DEFAULT_URI:-http://localhost:${APP_HTTP_PORT:-8090}}"
    ports:
      - "${APP_HTTP_PORT:-8090}:8080"
    depends_on:
      - database
    volumes:
      - ./:/app:cached
      - symfony_var:/app/var

###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-client_secret_vault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-client_secret_vault}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "${POSTGRES_PORT:-5452}:5432"
    volumes:
      - database_data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
  symfony_var:
